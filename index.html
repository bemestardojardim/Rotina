// ========== VARIÁVEIS GLOBAIS ==========
let usuariosConfig = [];

// ========== LOGIN ==========
function fazerLogin(username, senha) {
  const usuario = usuariosConfig.find(u => u.id === username.toLowerCase() && u.senha === senha);
  if (usuario) {
    usuarioAtual = usuario;
    localStorage.setItem('usuarioLogado', JSON.stringify({ id: usuario.id, nome: usuario.nome }));
    aplicarTema(usuario);
    carregarDadosFirebase();
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appContainer').style.display = 'block';
  } else {
    document.getElementById('loginError').innerText = 'Usuário ou senha inválidos!';
  }
}

function aplicarTema(usuario) {
  const root = document.documentElement;
  document.body.style.background = `linear-gradient(135deg, ${usuario.cor_primaria}20 0%, ${usuario.cor_secundaria}40 100%)`;
  const header = document.getElementById('appHeader');
  if (header) header.style.background = usuario.cor_primaria;
  const timelineHeader = document.getElementById('timelineHeader');
  const extraHeader = document.getElementById('extraHeader');
  if (timelineHeader) timelineHeader.style.background = usuario.cor_secundaria;
  if (extraHeader) extraHeader.style.background = usuario.cor_secundaria;
  document.getElementById('userNameDisplay').innerHTML = `👤 ${usuario.nome}`;
  document.getElementById('appTitle').innerHTML = `🌱 Rotina de ${usuario.nome}`;
}

function verificarLoginSalvo() {
  const salvo = localStorage.getItem('usuarioLogado');
  if (salvo) {
    const { id } = JSON.parse(salvo);
    const usuario = usuariosConfig.find(u => u.id === id);
    if (usuario) {
      usuarioAtual = usuario;
      aplicarTema(usuario);
      carregarDadosFirebase();
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appContainer').style.display = 'block';
    }
  }
}

function fazerLogout() {
  localStorage.removeItem('usuarioLogado');
  usuarioAtual = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appContainer').style.display = 'none';
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginError').innerText = '';
}

// ========== FIREBASE: CARREGAR DADOS ==========
function carregarDadosFirebase() {
  if (!usuarioAtual) return;
  
  // Carregar estrutura das tarefas (lista)
  database.ref(`/users/${usuarioAtual.id}/tarefas`).on('value', (snapshot) => {
    const data = snapshot.val();
    if (data && data.rotina) tarefasRotina = data.rotina;
    else tarefasRotina = JSON.parse(JSON.stringify(tarefasPadrao.rotina));
    if (data && data.essenciais) tarefasEssenciais = data.essenciais;
    else tarefasEssenciais = JSON.parse(JSON.stringify(tarefasPadrao.essenciais));
    renderizarTudo();
  });
  
  // Carregar status de conclusão
  database.ref(`/users/${usuarioAtual.id}/status`).on('value', (snapshot) => {
    tasksStatus = snapshot.val() || {};
    renderizarTudo();
  });
}

function salvarStatusTarefa(id, checked) {
  if (!usuarioAtual) return;
  const updates = {};
  updates[`/users/${usuarioAtual.id}/status/${id}`] = checked;
  database.ref().update(updates);
}

function salvarOrdemRotina(novaOrdem) {
  if (!usuarioAtual) return;
  database.ref(`/users/${usuarioAtual.id}/tarefas/rotina`).set(novaOrdem);
}

function salvarOrdemEssenciais(novaOrdem) {
  if (!usuarioAtual) return;
  database.ref(`/users/${usuarioAtual.id}/tarefas/essenciais`).set(novaOrdem);
}

function adicionarTarefa(tipo, descricao, horarioIcone) {
  if (!podeAdicionar()) {
    alert('Você não tem permissão para adicionar tarefas.');
    return;
  }
  const novaId = `${tipo === 'rotina' ? 't' : 'e'}${Date.now()}`;
  const novaTarefa = { id: novaId, descricao: descricao };
  if (tipo === 'rotina') {
    novaTarefa.horario = horarioIcone || '--:--';
    tarefasRotina.push(novaTarefa);
    salvarOrdemRotina(tarefasRotina);
  } else {
    novaTarefa.icone = horarioIcone || '📌';
    tarefasEssenciais.push(novaTarefa);
    salvarOrdemEssenciais(tarefasEssenciais);
  }
}

function editarTarefa(tipo, id, novaDesc, novoHorario) {
  if (!podeEditar()) {
    alert('Você não tem permissão para editar tarefas.');
    return;
  }
  if (tipo === 'rotina') {
    const idx = tarefasRotina.findIndex(t => t.id === id);
    if (idx !== -1) {
      tarefasRotina[idx].descricao = novaDesc;
      tarefasRotina[idx].horario = novoHorario;
      salvarOrdemRotina(tarefasRotina);
    }
  } else {
    const idx = tarefasEssenciais.findIndex(t => t.id === id);
    if (idx !== -1) {
      tarefasEssenciais[idx].descricao = novaDesc;
      tarefasEssenciais[idx].icone = novoHorario;
      salvarOrdemEssenciais(tarefasEssenciais);
    }
  }
}

function deletarTarefa(tipo, id) {
  if (!podeEditar()) {
    alert('Você não tem permissão para deletar tarefas.');
    return;
  }
  if (tipo === 'rotina') {
    tarefasRotina = tarefasRotina.filter(t => t.id !== id);
    salvarOrdemRotina(tarefasRotina);
  } else {
    tarefasEssenciais = tarefasEssenciais.filter(t => t.id !== id);
    salvarOrdemEssenciais(tarefasEssenciais);
  }
  database.ref(`/users/${usuarioAtual.id}/status/${id}`).remove();
}

function resetarTudo() {
  if (!podeEditar()) {
    alert('Você não tem permissão para resetar tarefas.');
    return;
  }
  if (confirm('⚠️ Resetar todas as tarefas para o padrão?')) {
    tarefasRotina = JSON.parse(JSON.stringify(tarefasPadrao.rotina));
    tarefasEssenciais = JSON.parse(JSON.stringify(tarefasPadrao.essenciais));
    salvarOrdemRotina(tarefasRotina);
    salvarOrdemEssenciais(tarefasEssenciais);
    tasksStatus = {};
    database.ref(`/users/${usuarioAtual.id}/status`).set({});
  }
}

// ========== PERMISSÕES ==========
function podeEditar() {
  return usuarioAtual?.permissoes?.includes('editar_tudo') || usuarioAtual?.id === 'gerardo' || usuarioAtual?.id === 'ronan';
}

function podeReordenar() {
  return usuarioAtual?.permissoes?.includes('reordenar_tudo') || usuarioAtual?.id === 'ronan';
}

function podeAdicionar() {
  return usuarioAtual?.permissoes?.includes('adicionar_tarefas') || usuarioAtual?.id === 'gerardo' || usuarioAtual?.id === 'ronan';
}

// ========== RENDERIZAÇÃO COM DRAG & DROP ==========
function renderizarTudo() {
  renderizarLista('timelineContainer', tarefasRotina, 'rotina', true);
  renderizarLista('extraContainer', tarefasEssenciais, 'essencial', false);
  atualizarContador();
}

function renderizarLista(containerId, tarefas, tipo, mostraHorario) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  
  tarefas.forEach((tarefa, idx) => {
    const isChecked = tasksStatus[tarefa.id] === true;
    const taskDiv = document.createElement('div');
    taskDiv.className = `task-item ${isChecked ? 'completed-task' : ''}`;
    taskDiv.setAttribute('data-id', tarefa.id);
    taskDiv.setAttribute('data-tipo', tipo);
    taskDiv.setAttribute('data-index', idx);
    
    // Drag & Drop apenas se tiver permissão
    if (podeReordenar()) {
      taskDiv.draggable = true;
      taskDiv.addEventListener('dragstart', handleDragStart);
      taskDiv.addEventListener('dragover', handleDragOver);
      taskDiv.addEventListener('drop', handleDrop);
    }
    
    // Handle de arrasto
    const dragHandle = document.createElement('span');
    dragHandle.className = 'drag-handle';
    dragHandle.innerHTML = '⋮⋮';
    dragHandle.style.cursor = podeReordenar() ? 'grab' : 'default';
    
    // Checkbox
    const checkWrapper = document.createElement('div');
    checkWrapper.className = 'task-check';
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.checked = isChecked;
    // Evento para marcar/desmarcar - CORRIGIDO!
    checkbox.addEventListener('change', (e) => {
      e.stopPropagation();
      const novoStatus = checkbox.checked;
      salvarStatusTarefa(tarefa.id, novoStatus);
    });
    const spanMark = document.createElement('span');
    spanMark.className = 'checkmark';
    if (usuarioAtual) {
      spanMark.style.color = usuarioAtual.cor_primaria;
      spanMark.style.borderColor = usuarioAtual.cor_primaria;
    }
    checkWrapper.appendChild(checkbox);
    checkWrapper.appendChild(spanMark);
    
    // Info
    const infoDiv = document.createElement('div');
    infoDiv.className = 'task-info';
    const timeSpan = document.createElement('span');
    timeSpan.className = mostraHorario ? 'task-time' : 'task-icon';
    timeSpan.textContent = mostraHorario ? (tarefa.horario || '--:--') : (tarefa.icone || '⭐');
    const descSpan = document.createElement('span');
    descSpan.className = 'task-desc';
    descSpan.textContent = tarefa.descricao;
    infoDiv.appendChild(timeSpan);
    infoDiv.appendChild(descSpan);
    
    // Ações (editar/deletar)
    const actionsDiv = document.createElement('div');
    actionsDiv.className = 'task-actions';
    if (podeEditar()) {
      const editBtn = document.createElement('button');
      editBtn.innerHTML = '✏️';
      editBtn.className = 'edit-btn';
      editBtn.onclick = (e) => {
        e.stopPropagation();
        abrirModalEdicao(tipo, tarefa.id, tarefa.descricao, mostraHorario ? tarefa.horario : tarefa.icone);
      };
      const delBtn = document.createElement('button');
      delBtn.innerHTML = '🗑️';
      delBtn.className = 'delete-btn';
      delBtn.onclick = (e) => {
        e.stopPropagation();
        deletarTarefa(tipo, tarefa.id);
      };
      actionsDiv.appendChild(editBtn);
      actionsDiv.appendChild(delBtn);
    }
    
    taskDiv.appendChild(dragHandle);
    taskDiv.appendChild(checkWrapper);
    taskDiv.appendChild(infoDiv);
    taskDiv.appendChild(actionsDiv);
    container.appendChild(taskDiv);
  });
}

// Drag & Drop handlers
function handleDragStart(e) {
  if (!podeReordenar()) return;
  dragSource = e.target.closest('.task-item');
  e.dataTransfer.effectAllowed = 'move';
  if (dragSource) dragSource.style.opacity = '0.5';
}

function handleDragOver(e) {
  if (!podeReordenar()) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function handleDrop(e) {
  if (!podeReordenar()) return;
  e.preventDefault();
  if (dragSource) dragSource.style.opacity = '';
  const target = e.target.closest('.task-item');
  if (!dragSource || !target || dragSource === target) return;
  
  const sourceTipo = dragSource.getAttribute('data-tipo');
  const targetTipo = target.getAttribute('data-tipo');
  if (sourceTipo !== targetTipo) return;
  
  const sourceId = dragSource.getAttribute('data-id');
  const targetId = target.getAttribute('data-id');
  
  let lista = sourceTipo === 'rotina' ? [...tarefasRotina] : [...tarefasEssenciais];
  const sourceIndex = lista.findIndex(t => t.id === sourceId);
  const targetIndex = lista.findIndex(t => t.id === targetId);
  
  if (sourceIndex !== -1 && targetIndex !== -1) {
    const [movido] = lista.splice(sourceIndex, 1);
    lista.splice(targetIndex, 0, movido);
    if (sourceTipo === 'rotina') {
      tarefasRotina = lista;
      salvarOrdemRotina(tarefasRotina);
    } else {
      tarefasEssenciais = lista;
      salvarOrdemEssenciais(tarefasEssenciais);
    }
  }
  dragSource = null;
}

function atualizarContador() {
  const total = tarefasRotina.length + tarefasEssenciais.length;
  let concluidas = 0;
  [...tarefasRotina, ...tarefasEssenciais].forEach(t => {
    if (tasksStatus[t.id]) concluidas++;
  });
  const stats = document.getElementById('globalStats');
  if (stats) stats.innerHTML = `✅ ${concluidas} / ${total} concluídas`;
}

// ========== MODAL ==========
function abrirModalAdicionar() {
  if (!podeAdicionar()) {
    alert('Você não tem permissão para adicionar tarefas.');
    return;
  }
  editandoId = null;
  document.getElementById('modalTitle').innerText = 'Adicionar Tarefa';
  document.getElementById('modalTaskDesc').value = '';
  document.getElementById('modalTaskTime').value = '';
  document.getElementById('taskModal').style.display = 'flex';
}

function abrirModalEdicao(tipo, id, desc, horario) {
  if (!podeEditar()) {
    alert('Você não tem permissão para editar tarefas.');
    return;
  }
  editandoId = id;
  editandoTipo = tipo;
  document.getElementById('modalTitle').innerText = 'Editar Tarefa';
  document.getElementById('modalTaskDesc').value = desc;
  document.getElementById('modalTaskTime').value = horario || '';
  document.getElementById('taskModal').style.display = 'flex';
}

function salvarModal() {
  const desc = document.getElementById('modalTaskDesc').value.trim();
  const horario = document.getElementById('modalTaskTime').value.trim();
  const tipo = document.getElementById('modalTaskType').value;
  
  if (!desc) {
    alert('Digite uma descrição!');
    return;
  }
  
  if (editandoId) {
    editarTarefa(editandoTipo, editandoId, desc, horario);
  } else {
    adicionarTarefa(tipo, desc, horario);
  }
  fecharModal();
}

function fecharModal() {
  document.getElementById('taskModal').style.display = 'none';
  editandoId = null;
}

// ========== EVENTOS E INICIALIZAÇÃO ==========
document.addEventListener('DOMContentLoaded', async () => {
  await carregarConfig();
  verificarLoginSalvo();
  
  document.getElementById('loginBtn').onclick = () => {
    const user = document.getElementById('loginUsername').value;
    const pass = document.getElementById('loginPassword').value;
    fazerLogin(user, pass);
  };
  
  document.getElementById('logoutBtn').onclick = fazerLogout;
  document.getElementById('resetAllBtn').onclick = resetarTudo;
  document.getElementById('addTimelineBtn').onclick = () => {
    document.getElementById('modalTaskType').value = 'rotina';
    abrirModalAdicionar();
  };
  document.getElementById('addExtraBtn').onclick = () => {
    document.getElementById('modalTaskType').value = 'essencial';
    abrirModalAdicionar();
  };
  document.getElementById('modalSaveBtn').onclick = salvarModal;
  document.getElementById('modalCancelBtn').onclick = fecharModal;
});
</script>
</body>
</html>
